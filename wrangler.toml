name = "game-dashboard"
main = "src/worker.js"
compatibility_date = "2026-04-24"

[[d1_databases]]
binding = "DB"
database_name = "game-dashboard-db"
# Run `npx wrangler d1 create game-dashboard-db`, then paste the returned database_id here.
database_id = "9759c99c-47f6-4c70-b0f7-6d85ec9b5b2b"

[[r2_buckets]]
binding = "BUILDS_BUCKET"
bucket_name = "game-dashboard-builds"

[vars]
R2_BUCKET_NAME = "game-dashboard-builds"
LAUNCHER_PROJECT_ID = "project-mano-launcher"
LAUNCHER_BUNDLE_ID = "com.manostudio.launcher"
# Cloudflare dashboard -> Workers & Pages -> Overview, or the account id in your deploy log URL.
R2_ACCOUNT_ID = "4956abaf4d499cde396a8c7ebf6061c6"
R2_PUBLIC_URL = ""
