name = "game-dashboard"
main = "src/worker.js"
compatibility_date = "2026-04-24"

[[d1_databases]]
binding = "DB"
database_name = "game-dashboard-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "BUILDS_BUCKET"
bucket_name = "game-dashboard-builds"

[vars]
R2_BUCKET_NAME = "game-dashboard-builds"
R2_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"
R2_PUBLIC_URL = ""
