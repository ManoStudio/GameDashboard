<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Build Producer Dashboard</title>
    <style>
        :root {
            --ink: #16211f;
            --muted: #5d6d66;
            --line: #dce5df;
            --panel: #ffffff;
            --page: #f4f7f2;
            --lime: #b7ff5a;
            --rose: #ca3f64;
            --charcoal: #1f2a27;
            --shadow: 0 16px 40px rgba(31, 42, 39, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--page);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 18px;
        }

        .panel {
            width: min(420px, 100%);
            display: grid;
            gap: 18px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mark {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            background: var(--lime);
            color: var(--charcoal);
            font-weight: 800;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.1;
        }

        .meta,
        .label {
            color: var(--muted);
        }

        .form-grid,
        .field {
            display: grid;
            gap: 10px;
        }

        .label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdf9;
            color: var(--ink);
            padding: 10px 12px;
            font: inherit;
        }

        button {
            min-height: 42px;
            border: 0;
            border-radius: 8px;
            background: var(--charcoal);
            color: #fff;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }

        .alert {
            border: 1px solid #efb2c1;
            background: #fff0f4;
            color: var(--rose);
            border-radius: 8px;
            padding: 12px;
        }
    </style>
</head>

<body>
    <main class="panel">
        <div class="brand">
            <div class="mark">BP</div>
            <div>
                <h1>Build Producer</h1>
                <div class="meta">Dashboard login</div>
            </div>
        </div>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        {% if firebase_error %}
        <div class="alert">Firebase is not configured, so only demo/admin env users can sign in.</div>
        {% endif %}

        <form class="form-grid" method="post">
            <label class="field">
                <span class="label">Email</span>
                <input name="email" type="email" autocomplete="email" required autofocus>
            </label>
            <label class="field">
                <span class="label">Password</span>
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Login</button>
        </form>
    </main>
</body>

</html>
